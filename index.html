<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Money Kept</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><h1>Money Kept</h1><div class="money-card"><div class="label">Money You Haven't Lost</div><div id="money" class="money">$0.00</div></div><div class="stats"><div class="card"><div class="small">Recovery Time</div><div id="recoveryTime"></div></div><div class="card"><div class="small">Hourly Rate</div><div id="hourlyRate"></div></div><div class="card"><div class="small">Saved Today</div><div id="today"></div></div></div><button id="settingsBtn">⚙ Settings</button></div><div id="modal" class="modal"><div class="modal-content"><h2>Settings</h2><label>Recovery Start</label><input id="startDate" type="datetime-local"><label>Average Hourly Loss</label><input id="hourlyLoss" type="number" step="0.01"><label>Currency Symbol</label><input id="currency" value="$"><button id="saveBtn">Save</button></div></div><script src="app.js"></script></body></html>
